body:
  text: 之一碑陽左相菩薩辛仕祭一心侍佛時菩薩主楊高賢妻劉若資一心侍佛左相都像主薛道通妻賈洪先息像慎女舍利女醜仁侍佛左相思唯佛主薛道成女足息永永彩兄弟等侍佛左相菩薩主五戒楊洪顯妻王他息五戒阿仕息伯通息業兒仕兄弟等為所生父母見存家口一心侍佛時右相菩薩主薛欽妻董蛇辨一心供養佛時右相思唯佛主張阿文呂和女息伏生女香免香姿侍佛右相都像主楊子英息新都息世高息進興一心侍佛比丘道暢比丘法和姊夫程顯孫比丘法護比丘惠威姊夫姚顯和比丘道貴比丘法夫外甥姚顯義比丘道和比丘道常外生宗建兆比丘曇暈比丘明纂外生程英俊比丘曇善比丘曇始姪薛唯摩比丘道圻比丘法洛姪薛純陀比丘曇約比丘法殊息薛翼遷比丘法太比丘法淵息薛鸞遷比丘法詢比丘道覺息薛龍遷比丘道龍副當陽主子英弟薛辨規妻張文都比丘法定息世高息興侍佛弟薛彥規比丘道王比丘道禾比丘法仰比丘曇殊弟薛敬規比丘曇普副當陽主晷元智弟薛奉規比丘辨賢供養主楊道弟薛英規齋主張羊妻晷一心侍佛弟令規當陽佛主楊解愁一心侍佛石像主薛鳳規上坎當陽主張魯仁一心侍佛父薛榮集發心起像主薛鳳規耳孫像慎母姚越薑邑主僧智供養主晷陳萬姊令姿邑主法遵比丘尼道思姊和姿維那道玩比丘尼智文姊次和維那道行比丘尼明勝姊延姿維那曇演比丘尼法讚妻裴仲妃比丘道勉比丘尼僧暈弟娣賈玉姿比丘法興比丘尼淨勝弟娣敬孟妃比丘道威比丘尼淨暈女化委比丘道英比丘尼法思姪女化國比丘僧珍比丘尼惠淨齋主呂買奴比丘道濟比丘尼道深齋主呂僧亮比丘法藏比丘尼道溫上轉文女足比丘法回比丘尼淨智願成主楊隴欽侍比丘曇興比丘尼曇延比丘尼淨璨比丘法顯比丘尼智貴比丘尼明璨發心莊嚴四區石像大檀越主善固為亡母及家一心侍佛夫靈原沖邈道絶有無之境至理幽遙動自俟心之外澄神虛寂達觀照矚之始凝懷妙果智鑒開化之初故心形絶尋則耶林雍蔚是以如來俯愍長迷規昏改晝托迹迦夷披融正路欲令人天同歸邪徒祇肅然大魏永安三年歲囑庚戌四海凶凶垂輪寇場九服荒荒干戈未戢遂令三輪𬍜駕法炬潛光七使馳馳於胸襟九結沉沉于心著且梵音悕唱於當時法鼓不振于今日而弟子等業寡常因冥羅塵滓限結免根形同朝露前不值釋迦初興卻不逢娘佉之子囑生今辰坎業之世塵回生老出垢靡徑抧荷冰火之間悲樂愛增之裏沉溺三毒之湖不習單楫之慕染著免岸未求彼圻自慨苦空弗逢斯世然苦海遐淪非精超不越是以佛弟子比丘僧智比丘道玩比丘道行比丘曇演直後羽林鑒安陽男薛鳳規鄉原道俗等遠藉蘭根淵槃万葉睿性瑕凝道心修遠仰慕先迹每唯真蹤沖邃故神禽愛德尚留影於北天葉公好龍由降形以示真仰緣斯趣各竭家珍建造石像一區舉高一丈諦心精務雕飾以就乃揮狀神儀髣佛古迹文素流彰朗如雲月其京石瑩飾允玉未能比其光艷綵怪目隨珠必也匿其曜此乃曠代之驚奇娑婆之絶也天人睹斯狀而雲集邪徒觀衆心而慕化欲令此範永閏於四生繼軌而不絶乃刊石銘記誨爾將來焉妙哉沖暈託體金質顯相八十凝然果一現應開津鏤容石出三有悟朗號曰惠日巍慈氏顯應蓍闍形無定方三界莫遮亦名太子亦名達拏獨坐道樹號曰釋迦雙林捨應邁也千零道俗迷正沉淪昏冥末後生信刊石開形影建玉飾万代留名維大隋仁壽二年歲次壬戌四月戊申朔八日乙卯三交村合村諸邑等為此舊像有邑子已上空位未題石之處共相縷化唱發敬造佛堂一行為皇帝陛下七世所生父母存亡眷屬俱登正覺之二碑陰釋迦佛開明主張羊為亡息天女多寶佛開明楊息為三世第四拘樓秦佛開明主楊愁父母及合家大小一心侍佛那含牟尼佛開明主宮子尚為父母合門大小一心侍佛邑主大都高上為皇帝陛下一心侍佛第六迦葉佛開明主為亡父見存妹羅仁侍佛第七釋迦牟尼佛開明化主楊洪七世父母所生父母合家大小佛一心侍佛第一維越佛開明主三主張男張羊孫拓俱一心見存道尚第三隨棄佛開明主張和國為亡父母楊桃暈合門大小一心侍佛邑主族都維那李法邑皇小胡維那王永興邑子王留顯邑主楊天壽維那雷集邑歸生邑子范僧保邑子賀祖顯邑子晷憂免邑子張副族邑子裴雙拔邑子臣歸歡邑子何小仁邑子關甕生邑子楊洪胤邑子董蓋族邑子張倉仁邑子王馬蘭邑子巨道邑子關曇勝邑子何伏興邑子關曇保邑子吳法順邑子費終邑子楊回龍邑子王龍成邑子雷始光邑子裴興回邑子何雀邑子王留德邑子呂僧亮邑子徐真郎邑子張勝歡邑子張回族邑子雷光始邑子蘇含伯邑子何道興邑子鄧回歡邑子王道溫邑子王世榮邑子趙伯歡邑子左顯標邑子關龍安邑子雷猛略邑子何集歡邑子楊兆居邑子皇甫市德邑子行胤提邑子楊伏歡邑子王龍像邑子巨弟邑子任興隆邑子何安族邑子楊庛歡邑子皇甫阿遵邑子行法歡邑子楊僧歡邑子梅引之邑子巨常洛邑子蘇早龍邑子何喬之邑子楊清即邑子皇甫景鸞邑子行僧顯邑子李黑奴邑子陰苗邑子裴回洛邑子雷敬族邑子何憐國邑子天邑子皇甫留顯邑子行思憐邑子晷高仁邑子王永洛邑子崔回邑子楊光謂邑子何蠻奴邑子楊臺終邑子李法海邑子王回龍邑子楊敬族邑子張蜀龍邑子雷含洛邑子楊鐘邑子何方奴邑子尹婆羅邑子張天族邑子楊男興邑子楊興龍邑子張胡頭邑子裴方榮邑子楊何蠻邑子何普勝邑子薛招賢邑子路雙洛邑子曲真貴邑子蘇洛邑子王天邑子蘇威世邑子丁康胡邑子何漫黑邑子王法延邑子路仵溫邑子尹顯遵邑子行延慶邑